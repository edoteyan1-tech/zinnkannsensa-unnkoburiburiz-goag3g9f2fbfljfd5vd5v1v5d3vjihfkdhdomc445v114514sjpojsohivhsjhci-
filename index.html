<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Motion Sensor</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: white; margin: 0; padding: 20px; }
        .hidden { display: none; }
        button { padding: 15px 25px; font-size: 1rem; cursor: pointer; border-radius: 8px; border: none; background: #007bff; color: white; margin: 10px; }
        input { padding: 10px; font-size: 1.2rem; width: 150px; text-align: center; border-radius: 5px; border: none; }
        #pin-display { font-size: 3rem; font-weight: bold; color: #ffeb3b; margin: 20px 0; }
        video { width: 100%; max-width: 320px; border: 2px solid #444; border-radius: 10px; }
        #status { margin-top: 20px; font-weight: bold; }
        .alarm-active { background: red !important; animation: blink 0.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <h1>Web人感センサー</h1>

    <div id="mode-selection">
        <p>モードを選択してください</p>
        <button onclick="startSensorMode()">センサー側 (カメラ)</button><br>
        <button onclick="startReceiverMode()">通知を受け取る側</button>
    </div>

    <div id="sensor-ui" class="hidden">
        <h2>センサー待機中</h2>
        <p>受信側で入力してください：</p>
        <div id="pin-display">-----</div>
        <video id="video" autoplay playsinline muted></video>
        <div id="sensor-status">カメラ準備中...</div>
        <canvas id="canvasPrev" style="display:none;"></canvas>
        <canvas id="canvasCurr" style="display:none;"></canvas>
    </div>

    <div id="receiver-ui" class="hidden">
        <h2>通知待機モード</h2>
        <input type="number" id="pin-input" placeholder="5桁の番号">
        <button onclick="connectToSensor()">接続する</button>
        <div id="receiver-status">番号を入力して接続してください</div>
        <p style="font-size: 0.8rem; color: #ccc;">※接続ボタンを押すと音が鳴るようになります</p>
    </div>

    <script>
        let peer = null;
        let conn = null;
        const pinPrefix = "motion-p2p-"; // ID衝突回避用

        // --- 音声アラーム設定 ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playAlarmSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime); // ラの音
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            gain.gain.setValueAtTime(1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1);
            osc.start();
            osc.stop(audioCtx.currentTime + 1);
        }

        // --- センサーモードの処理 ---
        function startSensorMode() {
            document.getElementById('mode-selection').classList.add('hidden');
            document.getElementById('sensor-ui').classList.remove('hidden');
            
            // 5桁の暗証番号生成
            const pin = Math.floor(10000 + Math.random() * 90000).toString();
            document.getElementById('pin-display').innerText = pin;

            peer = new Peer(pinPrefix + pin);
            
            peer.on('connection', (c) => {
                conn = c;
                document.getElementById('sensor-status').innerText = "受信機と接続完了！監視中...";
            });

            startCamera();
        }

        async function startCamera() {
            const video = document.getElementById('video');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    setupMotionDetection(video);
                };
            } catch (err) {
                alert("カメラエラー: " + err);
            }
        }

       function setupMotionDetection(video) {
    const canvasPrev = document.getElementById('canvasPrev');
    const canvasCurr = document.getElementById('canvasCurr');
    const ctxPrev = canvasPrev.getContext('2d', { willReadFrequently: true });
    const ctxCurr = canvasCurr.getContext('2d', { willReadFrequently: true });
    
    const THRESHOLD = 100;
    const SENSITIVITY = 0.25;
    const REQUIRED_STREAK = 5; // さらに慎重に
    
    let isCoolingDown = false;
    let detectionStreak = 0;
    let frameCount = 0;

    function check() {
        // 【修正1】カメラが実際に映像を出力しているかチェック
        if (video.videoWidth === 0) {
            requestAnimationFrame(check);
            return;
        }

        canvasCurr.width = canvasPrev.width = 40;
        canvasCurr.height = canvasPrev.height = 30;
        
        ctxCurr.filter = 'grayscale(100%)';
        ctxCurr.drawImage(video, 0, 0, 40, 30);
        
        const currData = ctxCurr.getImageData(0, 0, 40, 30).data;
        const prevData = ctxPrev.getImageData(0, 0, 40, 30).data;

        // 【修正2】最初の100フレーム（約3〜5秒）は比較せず、前回のデータを更新し続けるだけにする
        if (frameCount < 100) {
            ctxPrev.drawImage(canvasCurr, 0, 0);
            frameCount++;
            requestAnimationFrame(check);
            return;
        }

        let diff = 0;
        for (let i = 0; i < currData.length; i += 4) {
            if (Math.abs(currData[i] - prevData[i]) > THRESHOLD) {
                diff++;
            }
        }

        const ratio = diff / (40 * 30);

        // 【修正3】画面の90%以上が変わった場合は「カメラの不具合や照明のオンオフ」とみなして無視する
        if (ratio > SENSITIVITY && ratio < 0.9) {
            detectionStreak++;
        } else {
            detectionStreak = 0; 
        }

        if (detectionStreak >= REQUIRED_STREAK && !isCoolingDown) {
            if (conn && conn.open) {
                conn.send('ALARM');
                isCoolingDown = true;
                setTimeout(() => { isCoolingDown = false; }, 8000);
            }
            detectionStreak = 0; 
        }

        ctxPrev.drawImage(canvasCurr, 0, 0);
        requestAnimationFrame(check);
    }
    check();
}
        // --- 受信モードの処理 ---
        function startReceiverMode() {
            document.getElementById('mode-selection').classList.add('hidden');
            document.getElementById('receiver-ui').classList.remove('hidden');
            peer = new Peer();
        }

        function connectToSensor() {
            const pin = document.getElementById('pin-input').value;
            if (pin.length !== 5) return alert("5桁の番号を入力してください");

            // ブラウザの音出力制限解除
            audioCtx.resume();

            conn = peer.connect(pinPrefix + pin);
            conn.on('open', () => {
                document.getElementById('receiver-status').innerText = "センサーに接続しました。待機中...";
                document.getElementById('receiver-ui').style.background = "#004d40";
            });

            conn.on('data', (data) => {
                if (data === 'ALARM') {
                    triggerAlert();
                }
            });
        }

        function triggerAlert() {
            playAlarmSound();
            document.body.classList.add('alarm-active');
            document.getElementById('receiver-status').innerText = "🚨 動きを検知しました！";
            setTimeout(() => {
                document.body.classList.remove('alarm-active');
                document.getElementById('receiver-status').innerText = "監視中...";
            }, 2000);
        }
    </script>
</body>
</html>
