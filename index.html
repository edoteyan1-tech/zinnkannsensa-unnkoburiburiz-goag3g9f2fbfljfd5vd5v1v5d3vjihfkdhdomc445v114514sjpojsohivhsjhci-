<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,"> <title>Fixed Motion Sensor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: white; margin: 0; padding: 20px; }
        .hidden { display: none; }
        button { padding: 15px 25px; font-size: 1rem; cursor: pointer; border-radius: 8px; border: none; background: #007bff; color: white; margin: 10px; }
        input { padding: 10px; font-size: 1.2rem; width: 150px; text-align: center; border-radius: 5px; border: none; }
        #pin-display { font-size: 3rem; font-weight: bold; color: #ffeb3b; margin: 20px 0; }
        video { width: 100%; max-width: 320px; border: 2px solid #444; border-radius: 10px; }
        .alarm-active { background: red !important; animation: blink 0.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <h1>Web人感センサー</h1>

    <div id="mode-selection">
        <button onclick="startSensorMode()">センサー側 (カメラ)</button><br>
        <button onclick="startReceiverMode()">通知を受け取る側</button>
    </div>

    <div id="sensor-ui" class="hidden">
        <h2>センサー待機中</h2>
        <div id="pin-display">-----</div>
        <video id="video" autoplay playsinline muted></video>
        <div id="sensor-status">カメラ初期化中...</div>
        <canvas id="canvasPrev" style="display:none;"></canvas>
        <canvas id="canvasCurr" style="display:none;"></canvas>
    </div>

    <div id="receiver-ui" class="hidden">
        <h2>通知待機モード</h2>
        <input type="number" id="pin-input" placeholder="5桁">
        <button onclick="connectToSensor()">接続</button>
        <div id="receiver-status">接続待機...</div>
    </div>

    <script>
        let peer = null;
        let conn = null;
        const pinPrefix = "motion-p2p-";

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playAlarmSound() {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.5);
            osc.stop(audioCtx.currentTime + 1.5);
        }

        function startSensorMode() {
            document.getElementById('mode-selection').classList.add('hidden');
            document.getElementById('sensor-ui').classList.remove('hidden');
            const pin = Math.floor(10000 + Math.random() * 90000).toString();
            document.getElementById('pin-display').innerText = pin;

            try {
                peer = new Peer(pinPrefix + pin);
                peer.on('connection', (c) => {
                    conn = c;
                    document.getElementById('sensor-status').innerText = "接続済み：監視中";
                });
                peer.on('error', (err) => console.error("Peer Error:", err));
                startCamera();
            } catch (e) {
                alert("通信初期化エラー: " + e.message);
            }
        }

        async function startCamera() {
            const video = document.getElementById('video');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
                video.onloadedmetadata = () => setupMotionDetection(video);
            } catch (err) {
                document.getElementById('sensor-status').innerText = "カメラが利用できません";
                console.error("Camera Error:", err);
            }
        }

        function setupMotionDetection(video) {
            const canvasPrev = document.getElementById('canvasPrev');
            const canvasCurr = document.getElementById('canvasCurr');
            const ctxPrev = canvasPrev.getContext('2d', { willReadFrequently: true });
            const ctxCurr = canvasCurr.getContext('2d', { willReadFrequently: true });
            
            const THRESHOLD = 110;
            const SENSITIVITY = 0.3; // 画面の30%
            const REQUIRED_STREAK = 5;
            
            let isCoolingDown = false;
            let detectionStreak = 0;
            let setupFrames = 0;

            function check() {
                // カメラ映像がない場合は何もしない
                if (!video.srcObject || video.videoWidth === 0) {
                    requestAnimationFrame(check);
                    return;
                }

                canvasCurr.width = canvasPrev.width = 40;
                canvasCurr.height = canvasPrev.height = 30;
                
                ctxCurr.filter = 'grayscale(100%)';
                ctxCurr.drawImage(video, 0, 0, 40, 30);
                
                if (setupFrames < 60) { // 最初の60フレームは学習
                    ctxPrev.drawImage(canvasCurr, 0, 0);
                    setupFrames++;
                    requestAnimationFrame(check);
                    return;
                }

                const currData = ctxCurr.getImageData(0, 0, 40, 30).data;
                const prevData = ctxPrev.getImageData(0, 0, 40, 30).data;

                let diff = 0;
                for (let i = 0; i < currData.length; i += 4) {
                    if (Math.abs(currData[i] - prevData[i]) > THRESHOLD) diff++;
                }

                const ratio = diff / (40 * 30);

                // 30%以上90%未満の変化で検知
                if (ratio > SENSITIVITY && ratio < 0.9) {
                    detectionStreak++;
                } else {
                    detectionStreak = 0;
                }

                if (detectionStreak >= REQUIRED_STREAK && !isCoolingDown) {
                    if (conn && conn.open) {
                        conn.send('ALARM');
                        isCoolingDown = true;
                        setTimeout(() => { isCoolingDown = false; }, 5000);
                    }
                    detectionStreak = 0;
                }

                ctxPrev.drawImage(canvasCurr, 0, 0);
                requestAnimationFrame(check);
            }
            check();
        }

        function startReceiverMode() {
            document.getElementById('mode-selection').classList.add('hidden');
            document.getElementById('receiver-ui').classList.remove('hidden');
            peer = new Peer();
        }

        function connectToSensor() {
            const pin = document.getElementById('pin-input').value;
            if (pin.length !== 5) return alert("5桁の番号を入力してください");
            audioCtx.resume();
            
            conn = peer.connect(pinPrefix + pin);
            conn.on('open', () => {
                document.getElementById('receiver-status').innerText = "接続完了：待機中";
            });
            conn.on('data', (data) => {
                if (data === 'ALARM') {
                    playAlarmSound();
                    document.body.classList.add('alarm-active');
                    setTimeout(() => document.body.classList.remove('alarm-active'), 1000);
                }
            });
        }
    </script>
</body>
</html>
